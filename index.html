<!DOCTYPE html>
<html>
    <head>
        <title>MiniProject</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="parent">
            <!--HEADER-->
            <div class="header">
                <img src="amazon.png" alt="amazon">
                <div class="menu">
                    <a href="#"><i class="fa fa-home"></i>Home</a>
                    <a href="#"><i class="fa fa-info"></i>About</a>
                    <a href="#"><i class="fa fa-envelope"></i>Contact</a>
                    <a href="#"><i class="fa fa-sign-in"></i>Login</a>
                </div>
            </div>
            <!--MENU-->
            <div class="main">
                <div class="mobile">
                    <img src="mobile1.jpg" alt="Realme">
                    <p>RealMe</p>
                    <p>Qty : 10</p>
                    <p><i class="fa fa-inr"></i>10000</p>
                </div>

                <div class="mobile">
                    <img src="images2.jpg" alt="Vivo">
                    <p>Vivo</p>
                    <p>Qty : 10</p>
                    <p><i class="fa fa-inr">20000</i></p>
                </div>

                <div class="mobile">
                    <img src="images3.jpg" alt="Samsung">
                    <p>Samsung</p>
                    <p>Qty : 10</p>
                    <p><i class="fa fa-inr"></i>30000</p>
                </div>

                <div class="mobile">
                    <img src="images4.jpg" alt="Galaxy">
                    <p>Galaxy</p>
                    <p>Qty : 10</p>
                    <p><i class="fa fa-inr"></i>40000</p>
                </div>

                <div class="mobile">
                    <img src="images5.jpg" alt="Apple">
                    <p>Apple</p>
                    <p>Qty : 10</p>
                    <p><i class="fa fa-inr"></i>100000</p>
                </div>
            </div>
            <!--FOOTER-->
            <div class="footer">
                <p>copyright@amazon.in</p>
            </div>
        </div>
    </body>
</html>
