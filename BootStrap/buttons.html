<!DOCTYPE html>
<html>
    <head>
        <title>Buttons !!!</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div class="container mt-5">
            <button class="btn btn-primary">Button1</button>
            <button class="btn btn-secondary">Button2</button>
            <button class="btn btn-success">Button3</button>
            <button class="btn btn-danger">Button4</button>
            <button class="btn btn-warnig">Button5</button>
            <button class="btn btn-info">Button6</button>
            <button class="btn btn-light">Button7</button>
            <button class="btn btn-dark">Button8</button>

            <hr>
            <button class="btn btn-outline-primary">Button</button>
            <button class="btn btn-outline-secondary">Button</button>
            <button class="btn btn-outline-success">Button</button>
            <button class="btn btn-outline-danger">Button</button>
            <button class="btn btn-outline-warnig">Button</button>
            <button class="btn btn-outline-info">Button</button>
            <button class="btn btn-outline-light">Button</button>
            <button class="btn btn-outline-dark">Button</button>

            <hr>
            <button class="btn btn-secondary btn-lg">Button</button>
            <button class="btn btn-secondary btn-sm">Button</button>

            <hr>
            <button class="btn btn-link">Button</button>
        </div>
    </body>
</html>
