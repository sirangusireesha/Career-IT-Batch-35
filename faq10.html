<!DOCTYPE html>
<html>
    <head>
        <title>Block - Inline - InlineBlock</title>
        <style>
            div{
            width: 200px;
            height: 100px;
            border: 1px solid gray;
            text-align: center;
            background-color: blue;
            color: white;
            margin: 30px;
            padding: 30px;
            display: inline;
            }
        </style>
    </head>
    <body>
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </body>
</html>
